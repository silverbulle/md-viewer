<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Browser</title>
  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- highlight.js for code syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <!-- Mermaid.js for diagram rendering -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <!-- KaTeX for math formula rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    :root {
      --sidebar-width: 280px;
      --sidebar-bg: #1e1e2e;
      --sidebar-text: #cdd6f4;
      --sidebar-hover: #313244;
      --sidebar-active: #45475a;
      --sidebar-accent: #89b4fa;
      --content-bg: #ffffff;
      --content-text: #1e1e2e;
      --border-color: #e0e0e0;
      --code-bg: #f5f5f5;
      --link-color: #1e66f5;
      --heading-color: #1e1e2e;
      --table-header-bg: #f0f0f5;
      --table-border: #d0d0d0;
      --blockquote-border: #89b4fa;
      --blockquote-bg: #f8f9ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: var(--content-bg);
      color: var(--content-text);
    }

    /* ===== Sidebar ===== */
    #sidebar {
      position: relative;
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
      transition: width 0.2s ease, min-width 0.2s ease, opacity 0.2s ease, border-right-color 0.2s ease;
    }

    /* Collapsed: animate width to 0 so the main area fills smoothly.
       Using width/min-width (not display:none) keeps the transition live.
       !important overrides the inline width set by applySidebarWidth. */
    #sidebar.hidden {
      width: 0 !important;
      min-width: 0 !important;
      border-right-color: transparent;
      opacity: 0;
    }

    #sidebar.hidden #sidebar-resizer {
      display: none;
    }

    /* Drag handle on the sidebar's right edge */
    #sidebar-resizer {
      position: absolute;
      top: 0;
      right: -3px;
      width: 6px;
      height: 100%;
      cursor: col-resize;
      z-index: 50;
      background: transparent;
    }

    #sidebar-resizer:hover,
    #sidebar-resizer:active {
      background: var(--sidebar-accent);
      opacity: 0.5;
    }

    /* While dragging: disable text selection and pointer interference */
    body.resizing {
      user-select: none;
      cursor: col-resize !important;
    }

    body.resizing * {
      pointer-events: none;
    }

    body.resizing #sidebar-resizer {
      pointer-events: auto;
    }

    /* Disable the width transition during drag so the sidebar tracks the cursor */
    body.resizing #sidebar {
      transition: none !important;
    }

    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    #sidebar-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--sidebar-accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #dir-switch {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #dir-picker-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 34px;
      min-width: 34px;
      height: 30px;
      padding: 0;
      background: var(--sidebar-accent);
      color: var(--sidebar-bg);
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    #dir-picker-btn:hover {
      opacity: 0.85;
    }

    #dir-picker-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #dir-input-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #dir-input {
      flex: 1;
      min-width: 0;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 0 8px;
      height: 30px;
      color: var(--sidebar-text);
      font-size: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    #dir-input:focus {
      border-color: var(--sidebar-accent);
    }

    #dir-input::placeholder {
      color: #6c7086;
    }

    #dir-go-btn {
      background: rgba(255,255,255,0.12);
      color: var(--sidebar-text);
      border: none;
      border-radius: 4px;
      height: 30px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    #dir-go-btn:hover {
      opacity: 0.85;
    }

    #dir-go-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #dir-name {
      font-size: 11px;
      color: #a6adc8;
      margin-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #dir-error {
      font-size: 11px;
      color: #f38ba8;
      margin-top: 4px;
      display: none;
    }

    /* ===== Sidebar Tabs ===== */
    #sidebar-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .sidebar-tab {
      flex: 1;
      padding: 8px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #6c7086;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      text-align: center;
    }

    .sidebar-tab:hover {
      color: #bac2de;
    }

    .sidebar-tab.active {
      color: var(--sidebar-accent);
      border-bottom-color: var(--sidebar-accent);
    }

    .sidebar-tab:disabled {
      opacity: 0.35;
      cursor: default;
    }

    #tree-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      transition: opacity 0.12s ease;
    }

    #toc-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      display: none;
      transition: opacity 0.12s ease;
    }

    #toc-container::-webkit-scrollbar {
      width: 4px;
    }

    #toc-container::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }

    .toc-item {
      display: block;
      padding: 4px 12px;
      font-size: 13px;
      color: var(--sidebar-text);
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-decoration: none;
    }

    .toc-item:hover {
      background: var(--sidebar-hover);
    }

    .toc-item.active {
      color: var(--sidebar-accent);
      background: var(--sidebar-active);
    }

    .toc-h1 { padding-left: 12px; font-weight: 600; }
    .toc-h2 { padding-left: 24px; }
    .toc-h3 { padding-left: 36px; font-size: 12px; color: #a6adc8; }
    .toc-h4 { padding-left: 48px; font-size: 12px; color: #7f849c; }

    #toc-empty {
      padding: 20px 12px;
      font-size: 12px;
      color: #6c7086;
      text-align: center;
    }

    #tree-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    #tree-container::-webkit-scrollbar {
      width: 4px;
    }

    #tree-container::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }

    .tree-item {
      user-select: none;
    }

    .tree-folder {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #bac2de;
      transition: background 0.15s;
    }

    .tree-folder:hover {
      background: var(--sidebar-hover);
    }

    .tree-folder .icon {
      margin-right: 6px;
      font-size: 10px;
      transition: transform 0.2s;
      display: inline-block;
      width: 14px;
      text-align: center;
    }

    .tree-folder .icon.expanded {
      transform: rotate(90deg);
    }

    .tree-folder .folder-icon {
      margin-right: 6px;
      font-size: 14px;
    }

    .tree-children {
      display: none;
    }

    .tree-children.expanded {
      display: block;
    }

    .tree-file {
      display: flex;
      align-items: center;
      padding: 5px 12px 5px 32px;
      cursor: pointer;
      font-size: 13px;
      color: var(--sidebar-text);
      transition: background 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-file:hover {
      background: var(--sidebar-hover);
    }

    .tree-file.active {
      background: var(--sidebar-active);
      color: var(--sidebar-accent);
      border-left: 3px solid var(--sidebar-accent);
      padding-left: 29px;
    }

    .tree-file .file-icon {
      margin-right: 8px;
      font-size: 12px;
      opacity: 0.6;
    }

    /* ===== Main Content ===== */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #topbar {
      height: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      background: #fafafa;
      border-bottom: 1px solid var(--border-color);
      font-size: 13px;
      color: #666;
      position: relative;
    }

    #breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    #breadcrumb span {
      color: #999;
    }

    #breadcrumb .current {
      color: var(--content-text);
      font-weight: 500;
    }

    /* ===== Search ===== */
    #nav-buttons {
      display: flex;
      gap: 2px;
      margin-right: 12px;
      flex-shrink: 0;
    }

    #sidebar-toggle {
      margin-right: 12px;
      flex-shrink: 0;
    }

    .nav-btn {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: #fff;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .nav-btn:hover:not(:disabled) {
      background: #f0f0f0;
      border-color: #ccc;
    }

    .nav-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    #search-wrapper {
      position: relative;
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    #search-input-wrap {
      position: relative;
      width: 260px;
    }

    #search-input {
      width: 100%;
      padding: 6px 10px 6px 28px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #search-input:focus {
      border-color: var(--sidebar-accent);
      box-shadow: 0 0 0 2px rgba(137, 180, 250, 0.2);
    }

    #search-input::placeholder {
      color: #bbb;
    }

    #search-btn {
      padding: 6px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: #fff;
      color: #555;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }

    #search-btn:hover {
      background: #f0f0f0;
      border-color: #ccc;
    }

    #search-icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: #bbb;
      pointer-events: none;
    }

    #search-results {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      width: 400px;
      right: auto;
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      max-height: 420px;
      overflow-y: auto;
      z-index: 200;
    }

    #search-results.visible {
      display: block;
    }

    #search-results::-webkit-scrollbar {
      width: 4px;
    }

    #search-results::-webkit-scrollbar-thumb {
      background: #ddd;
      border-radius: 2px;
    }

    .search-result-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .search-result-item:hover {
      background: #f5f8ff;
    }

    .search-result-path {
      font-size: 11px;
      color: #999;
      margin-bottom: 2px;
    }

    .search-result-path .file-name {
      color: var(--link-color);
      font-weight: 500;
    }

    .search-result-text {
      font-size: 12px;
      color: #444;
      font-family: 'Consolas', 'Monaco', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-result-text mark {
      background: #fff3bf;
      color: inherit;
      padding: 0 1px;
      border-radius: 2px;
    }

    #search-status {
      padding: 8px 12px;
      font-size: 12px;
      color: #999;
      text-align: center;
    }

    /* ===== Search History ===== */
    #search-history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px 4px;
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #f0f0f0;
    }

    #search-history-clear {
      background: none;
      border: none;
      color: #999;
      font-size: 11px;
      cursor: pointer;
      padding: 0;
    }

    #search-history-clear:hover {
      color: #f38ba8;
    }

    .search-history-item {
      display: flex;
      align-items: center;
      padding: 7px 12px;
      cursor: pointer;
      border-bottom: 1px solid #f5f5f5;
      transition: background 0.1s;
    }

    .search-history-item:hover {
      background: #f5f8ff;
    }

    .search-history-item.active {
      background: #eef4ff;
    }

    .search-history-item .hist-icon {
      margin-right: 8px;
      font-size: 12px;
      color: #bbb;
      flex-shrink: 0;
    }

    .search-history-item .hist-text {
      flex: 1;
      font-size: 13px;
      color: #444;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-history-item .hist-del {
      margin-left: 8px;
      width: 18px;
      height: 18px;
      border: none;
      background: none;
      color: #ccc;
      font-size: 14px;
      cursor: pointer;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      line-height: 1;
    }

    .search-history-item .hist-del:hover {
      background: #f0f0f0;
      color: #f38ba8;
    }

    #search-history-empty {
      padding: 16px 12px;
      font-size: 12px;
      color: #bbb;
      text-align: center;
    }

    #content-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
    }

    #content {
      max-width: 860px;
      margin: 0 auto;
      line-height: 1.8;
    }

    /* ===== Welcome Screen ===== */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #999;
      text-align: center;
    }

    #welcome .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    #welcome h2 {
      font-size: 20px;
      color: #666;
      margin-bottom: 8px;
    }

    #welcome p {
      font-size: 14px;
    }

    /* ===== Markdown Styles ===== */
    #content h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--heading-color);
      margin: 0 0 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border-color);
    }

    #content h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--heading-color);
      margin: 36px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }

    #content h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--heading-color);
      margin: 28px 0 12px;
    }

    #content h4 {
      font-size: 16px;
      font-weight: 600;
      color: #444;
      margin: 24px 0 8px;
    }

    #content p {
      margin: 12px 0;
    }

    #content a {
      color: var(--link-color);
      text-decoration: none;
    }

    #content a:hover {
      text-decoration: underline;
    }

    #content code {
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.88em;
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 3px;
    }

    #content pre {
      background: var(--code-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin: 16px 0;
      line-height: 1.5;
    }

    #content pre code {
      background: none;
      padding: 0;
      font-size: 13px;
    }

    /* ===== Math Formulas (KaTeX) ===== */
    .math-display {
      display: block;
      text-align: center;
      margin: 18px 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2px 0;
    }

    .math-inline {
      display: inline;
      vertical-align: baseline;
    }

    /* KaTeX render-error fallback styling */
    .math-display .katex-error,
    .math-inline .katex-error {
      color: #f38ba8;
      font-family: 'Consolas', monospace;
      font-size: 0.9em;
    }

    /* ===== Mermaid Diagrams ===== */
    .mermaid-container {
      background: var(--code-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 20px;
      margin: 16px 0;
      overflow-x: auto;
      display: flex;
      justify-content: center;
      cursor: zoom-in;
      position: relative;
    }

    .mermaid-container::after {
      content: '🔍 点击放大';
      position: absolute;
      top: 6px;
      right: 10px;
      font-size: 11px;
      color: #999;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .mermaid-container:hover::after {
      opacity: 1;
    }

    .mermaid-container svg {
      height: auto;
    }

    /* Mermaid Zoom Overlay */
    .mermaid-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: default;
    }

    .mermaid-overlay-toolbar {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 6px;
      z-index: 10001;
    }

    .mermaid-overlay-toolbar button {
      width: 36px;
      height: 36px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: background 0.15s;
    }

    .mermaid-overlay-toolbar button:hover {
      background: #f0f0f0;
    }

    .mermaid-overlay-toolbar button.close-btn {
      font-size: 20px;
      margin-left: 8px;
    }

    .mermaid-overlay-viewport {
      width: 90vw;
      height: 85vh;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      position: relative;
    }

    .mermaid-overlay-content {
      transform-origin: top left;
      transition: transform 0.15s ease;
      padding: 40px;
      min-width: min-content;
    }

    .mermaid-overlay-content svg {
      max-width: none;
    }

    .mermaid-overlay-zoom-label {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      z-index: 10001;
    }

    .mermaid-error {
      background: #fff5f5;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 12px 16px;
      margin: 16px 0;
      color: #dc2626;
      font-size: 13px;
    }

    .mermaid-error summary {
      cursor: pointer;
      font-weight: 500;
    }

<body>
  <div id="sidebar">

        <button class="nav-btn" id="btn-forward" onclick="navigateForward()" disabled title="Forward (Ctrl+Right)">&#9654;</button>
      </div>
      <div id="search-wrapper">
        <div id="search-input-wrap">

          <div id="search-results"></div>
        </div>

    </div>
    <div id="content-wrapper">
      <div id="welcome">
        <div class="icon">📚</div>
        <h2>Markdown Browser</h2>
        <p>在左侧输入目录路径来加载 Markdown 文件</p>
        <p style="margin-top: 8px; font-size: 12px; color: #bbb;">例如: <code>D:\claude\001-network-protocols</code></p>
      </div>
      <div id="content" style="display:none;"></div>
    </div>
  </div>

  <script>
    // ===== State =====
    let currentFile = null;
    let treeData = null;

    // Navigation history
    let navHistory = [];
    let navIndex = -1;
    let navSkipPush = false;

    // ===== Sidebar resize/hide =====
    const SIDEBAR_WIDTH_KEY = 'md-browser-sidebar-width';
    const SIDEBAR_HIDDEN_KEY = 'md-browser-sidebar-hidden';
    const SIDEBAR_MIN = 180, SIDEBAR_MAX = 520, SIDEBAR_DEFAULT = 280;
    let isResizing = false;

    function applySidebarWidth(px) {
      const sidebar = document.getElementById('sidebar');
      if (!sidebar) return;
      sidebar.style.width = px + 'px';
      sidebar.style.minWidth = px + 'px'; // override CSS so it can shrink below the default
      document.documentElement.style.setProperty('--sidebar-width', px + 'px');
    }

    function setSidebarHidden(hidden) {
      const sidebar = document.getElementById('sidebar');
      const toggle = document.getElementById('sidebar-toggle');
      if (!sidebar) return;
      sidebar.classList.toggle('hidden', hidden);
      if (toggle) toggle.textContent = hidden ? '≫' : '☰';
      try { localStorage.setItem(SIDEBAR_HIDDEN_KEY, hidden ? '1' : '0'); } catch (_) {}
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      setSidebarHidden(!sidebar.classList.contains('hidden'));
    }

    function restoreSidebar() {
      // Restore width (clamp + NaN-safe)
      let px = SIDEBAR_DEFAULT;
      try {
        const raw = localStorage.getItem(SIDEBAR_WIDTH_KEY);
        if (raw !== null) {
          const n = parseInt(raw, 10);
          if (!Number.isNaN(n)) px = Math.min(SIDEBAR_MAX, Math.max(SIDEBAR_MIN, n));
        }
      } catch (_) {}
      applySidebarWidth(px);

      // Restore hidden state
      let hidden = false;
      try { hidden = localStorage.getItem(SIDEBAR_HIDDEN_KEY) === '1'; } catch (_) {}
      setSidebarHidden(hidden);
    }

    // Drag-to-resize handlers
    (function initResizer() {
      const resizer = document.getElementById('sidebar-resizer');
      if (!resizer) return;

      resizer.addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        isResizing = true;
        document.body.classList.add('resizing');
      });

      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        let px = e.clientX;
        px = Math.min(SIDEBAR_MAX, Math.max(SIDEBAR_MIN, px));
        applySidebarWidth(px);
      });

      document.addEventListener('mouseup', () => {
        if (!isResizing) return;
        isResizing = false;
        document.body.classList.remove('resizing');
        // Persist final width
        const sidebar = document.getElementById('sidebar');
        if (sidebar) {
          const w = parseInt(sidebar.style.width, 10);
          if (!Number.isNaN(w)) {
            try { localStorage.setItem(SIDEBAR_WIDTH_KEY, String(w)); } catch (_) {}
          }
        }
      });
    })();

    // ===== Configure marked.js =====
    marked.setOptions({
      breaks: false,
      gfm: true
    });

    // Custom renderer for internal links
    const renderer = new marked.Renderer();
    renderer.link = function(token) {
      // marked v12+: receives {href, title, text, tokens}
      const href = (typeof token === 'object' && token !== null) ? (token.href || '') : '';
      const title = (typeof token === 'object' && token !== null) ? (token.title || '') : '';
      const text = (typeof token === 'object' && token !== null) ? (token.text || '') : '';

      if (typeof href !== 'string') {
        return `<a href="" title="${title}">${text}</a>`;
      }

      // External links
      if (href.startsWith('http')) {
        return `<a href="${href}" target="_blank" rel="noopener" title="${title}">${text} ↗</a>`;
      }

      // Split path and fragment
      const hashIdx = href.indexOf('#');
      const linkPath = hashIdx >= 0 ? href.substring(0, hashIdx) : href;
      const fragment = hashIdx >= 0 ? href.substring(hashIdx + 1) : '';

      // Same-page anchor (no path, only #fragment)
      if (!linkPath && fragment) {
        return `<a href="#" onclick="scrollToAnchor('${fragment}'); return false;" title="${title}">${text}</a>`;
      }

      // .md file link (with or without fragment)
      if (linkPath.endsWith('.md')) {
        const fragArg = fragment ? `, '${fragment}'` : '';
        return `<a href="#" onclick="navigateToLink('${linkPath}'${fragArg}); return false;" title="${title}">${text}</a>`;
      }

      return `<a href="${href}" title="${title}">${text}</a>`;
    };

    // Custom renderer for images: resolve local relative paths to /api/asset,
    // and support Pandoc-style {width=.. height=..} attribute syntax that
    // marked doesn't parse natively (it would leak as literal text otherwise).
    renderer.image = function(token) {
      const href = (typeof token === 'object' && token !== null) ? (token.href || '') : '';
      let title = (typeof token === 'object' && token !== null) ? (token.title || '') : '';
      let alt = (typeof token === 'object' && token !== null) ? (token.text || '') : '';

      if (typeof href !== 'string') {
        return `<img alt="${alt}" title="${title}">`;
      }

      // External / data URLs — leave as-is
      if (href.startsWith('http') || href.startsWith('data:') || href.startsWith('//')) {
        return `<img src="${href}" alt="${alt}" title="${title}">`;
      }

      // marked sometimes stuffs trailing {width=...} into the title; also
      // accept it inline in alt text. Extract and apply as inline style.
      const attrMatch = (title + ' ' + alt).match(/\{[^}]*width\s*=\s*"?([^"}]+)"?[^}]*\}/i);
      let styleAttr = '';
      if (attrMatch) {
        const w = attrMatch[1];
        styleAttr = ` style="width:${w.includes('%') || w.includes('px') ? w : w + 'px'};max-width:100%;"`;
        // strip the {...} from title/alt so it doesn't render as tooltip/text
        title = title.replace(/\{[^}]*\}/g, '').trim();
        alt = alt.replace(/\{[^}]*\}/g, '').trim();
      }

      // Resolve relative path against the currently open file's directory
      const resolved = resolveAssetPath(href);
      const enc = encodeURIComponent(resolved);
      return `<img src="/api/asset?path=${enc}" alt="${escapeAttr(alt)}" title="${escapeAttr(title)}"${styleAttr}>`;
    };

    marked.use({ renderer });

    // ===== Configure Mermaid.js =====
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif',
      flowchart: { curve: 'basis', htmlLabels: true, useMaxWidth: false },
      sequence: { mirrorActors: false, useMaxWidth: false },
      mindmap: { padding: 16, useMaxWidth: false }
    });

    // ===== Math formula handling (KaTeX) =====
    // Math syntax ($...$, $$...$$) clashes with Markdown (underscores -> italic,
    // asterisks -> bold, etc.), so we extract formulas BEFORE marked renders,
    // replacing them with opaque placeholders, then restore + render with KaTeX
    // AFTER rendering. Placeholders use a shape that marked leaves untouched.
    const mathStore = []; // {placeholder, tex, display}
    let mathCounter = 0;

    function extractMath(src) {
      mathStore.length = 0;
      mathCounter = 0;
      if (!src) return src;

      // Split source into segments, separating fenced code blocks and inline
      // code from prose. Math is only extracted in prose segments so the code
      // blocks pass through marked untouched (preserving ``` / ` rendering).
      // Token shape: ['prose', 'code', 'prose', 'code', ...]
      const segments = [];
      let rest = src;
      const fenceRe = /```[\s\S]*?```/g;
      let last = 0;
      let m;
      const parts = [];
      while ((m = fenceRe.exec(rest)) !== null) {
        if (m.index > last) parts.push(['prose', rest.slice(last, m.index)]);
        parts.push(['code', m[0]]);
        last = m.index + m[0].length;
      }
      if (last < rest.length) parts.push(['prose', rest.slice(last)]);
      if (parts.length === 0) parts.push(['prose', rest]);

      const out = parts.map(([type, seg]) => {
        if (type === 'code') {
          // Still protect inline math-like $ inside code? No — code is literal.
          // But inline code within prose needs splitting too.
          return seg;
        }
        // prose: split out inline `code` runs, only process math in the rest
        const sub = [];
        let r = seg;
        let li = 0;
        const inlineRe = /`[^`\n]+`/g;
        let im;
        const iparts = [];
        while ((im = inlineRe.exec(r)) !== null) {
          if (im.index > li) iparts.push(['p', r.slice(li, im.index)]);
          iparts.push(['c', im[0]]);
          li = im.index + im[0].length;
        }
        if (li < r.length) iparts.push(['p', r.slice(li)]);
        if (iparts.length === 0) iparts.push(['p', r]);

        return iparts.map(([t, s]) => {
          if (t === 'c') return s;
          // Block math: $$...$$ (may span lines)
          s = s.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => {
            const placeholder = `MATHBLOCK${mathCounter++}`;
            mathStore.push({ placeholder, tex: tex.trim(), display: true });
            return `\n\n@@${placeholder}@@\n\n`;
          });
          // Inline math: $...$  (not \$, not $$, single line, non-empty, no leading/trailing space)
          s = s.replace(/(^|[^\\$])\$(?!\s)([^\n$]+?)(?<!\s)\$(?!\d)/g, (mm, pre, tex) => {
            const placeholder = `MATHINLINE${mathCounter++}`;
            mathStore.push({ placeholder, tex, display: false });
            return `${pre}@@${placeholder}@@`;
          });
          return s;
        }).join('');
      }).join('');

      return out;
    }

    function renderMath(retryCount = 0) {
      const content = document.getElementById('content');
      if (!content || mathStore.length === 0) return;

      // KaTeX loads from CDN; if it isn't ready yet, defer rendering until it is.
      if (typeof katex === 'undefined') {
        if (retryCount < 40) { // retry for up to ~20s
          setTimeout(() => renderMath(retryCount + 1), 500);
        } else {
          // Give up waiting — fall back to showing raw LaTeX so nothing is lost
          fallbackRawMath(content);
          console.warn('[MD Browser] KaTeX failed to load; showing raw math.');
        }
        return;
      }

      // Placeholders survive as text "@@MATHxxx@@". Walk text nodes and replace.
      const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null);
      const targets = [];
      while (walker.nextNode()) {
        if (/@@MATH(BLOCK|INLINE)\d+@@/.test(walker.currentNode.nodeValue)) {
          targets.push(walker.currentNode);
        }
      }

      let rendered = 0;
      for (const node of targets) {
        const parts = node.nodeValue.split(/(@@MATH(?:BLOCK|INLINE)\d+@@)/);
        if (parts.length <= 1) continue;
        const frag = document.createDocumentFragment();
        for (const part of parts) {
          const m = part.match(/^@@MATH(BLOCK|INLINE)(\d+)@@$/);
          if (m) {
            const entry = mathStore.find(e => e.placeholder === `MATH${m[1]}${m[2]}`);
            if (entry) {
              const span = document.createElement('span');
              span.className = entry.display ? 'math-display' : 'math-inline';
              try {
                katex.render(entry.tex, span, {
                  displayMode: entry.display,
                  throwOnError: false,
                  strict: false,
                  trust: false,
                  output: 'html'
                });
                rendered++;
              } catch (e) {
                span.textContent = entry.display ? `$$${entry.tex}$$` : `$${entry.tex}$`;
                span.className += ' katex-error';
              }
              frag.appendChild(span);
              continue;
            }
          }
          if (part) frag.appendChild(document.createTextNode(part));
        }
        if (node.parentNode) node.parentNode.replaceChild(frag, node);
      }

      // Safety net: if any placeholder survived (e.g. split across nodes),
      // fall back to raw LaTeX text so users see the formula instead of "@@MATH...@@".
      const w2 = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null);
      const remain = [];
      while (w2.nextNode()) {
        if (/@@MATH(BLOCK|INLINE)\d+@@/.test(w2.currentNode.nodeValue)) remain.push(w2.currentNode);
      }
      if (remain.length > 0) {
        for (const node of remain) {
          const txt = node.nodeValue;
          const replaced = txt.replace(/@@MATH(BLOCK|INLINE)(\d+)@@/g, (mm, kind, num) => {
            const entry = mathStore.find(e => e.placeholder === `MATH${kind}${num}`);
            if (!entry) return mm;
            return entry.display ? `$$${entry.tex}$$` : `$${entry.tex}$`;
          });
          if (replaced !== txt) node.nodeValue = replaced;
        }
      }
    }

    // Render raw LaTeX text (no KaTeX) as a fallback when KaTeX can't load
    function fallbackRawMath(content) {
      const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null);
      const targets = [];
      while (walker.nextNode()) {
        if (/@@MATH(BLOCK|INLINE)\d+@@/.test(walker.currentNode.nodeValue)) {
          targets.push(walker.currentNode);
        }
      }
      for (const node of targets) {
        const txt = node.nodeValue;
        const replaced = txt.replace(/@@MATH(BLOCK|INLINE)(\d+)@@/g, (mm, kind, num) => {
          const entry = mathStore.find(e => e.placeholder === `MATH${kind}${num}`);
          if (!entry) return mm;
          return entry.display ? `$$${entry.tex}$$` : `$${entry.tex}$`;
        });
        if (replaced !== txt) node.nodeValue = replaced;
      }
    }


    // Global counter for unique mermaid element IDs
    let mermaidCounter = 0;

    async function renderMermaidDiagrams() {
      const content = document.getElementById('content');
      const mermaidBlocks = content.querySelectorAll('pre code.language-mermaid');

      for (const block of mermaidBlocks) {
        const pre = block.parentNode;
        const code = block.textContent.trim();
        if (!code) continue;

        const id = `mermaid-${Date.now()}-${mermaidCounter++}`;
        const container = document.createElement('div');
        container.className = 'mermaid-container';

        try {
          const { svg } = await mermaid.render(id, code);
          container.innerHTML = svg;
          container.addEventListener('click', () => openMermaidOverlay(svg));
        } catch (e) {
          // Clean up any DOM residue left by mermaid on failure
          const leftover = document.getElementById(`d${id}`);
          if (leftover) leftover.remove();
          // Show a collapsible error with the raw source
          container.className = 'mermaid-error';
          container.innerHTML = `<details open>
            <summary>Mermaid 渲染失败: ${e.message || '未知错误'}</summary>
            <pre>${code.replace(/</g, '&lt;')}</pre>
          </details>`;
        }

        pre.parentNode.replaceChild(container, pre);
      }
    }

    // ===== Mermaid Zoom Overlay =====
    function openMermaidOverlay(svgHtml) {
      const overlay = document.createElement('div');
      overlay.className = 'mermaid-overlay';

      let zoom = 1;
      const ZOOM_STEP = 0.2;
      const ZOOM_MIN = 0.2;
      const ZOOM_MAX = 5;

      overlay.innerHTML = `
        <div class="mermaid-overlay-toolbar">
          <button class="zoom-in-btn" title="放大">＋</button>
          <button class="zoom-out-btn" title="缩小">－</button>
          <button class="zoom-reset-btn" title="重置">1:1</button>
          <button class="zoom-fit-btn" title="适应窗口">⊡</button>
          <button class="close-btn" title="关闭 (Esc)">✕</button>
        </div>
        <div class="mermaid-overlay-viewport">
          <div class="mermaid-overlay-content">${svgHtml}</div>
        </div>
        <div class="mermaid-overlay-zoom-label">100%</div>
      `;

      document.body.appendChild(overlay);
      document.body.style.overflow = 'hidden';

      const content = overlay.querySelector('.mermaid-overlay-content');
      const viewport = overlay.querySelector('.mermaid-overlay-viewport');
      const zoomLabel = overlay.querySelector('.mermaid-overlay-zoom-label');

      function updateZoom() {
        content.style.transform = `scale(${zoom})`;
        zoomLabel.textContent = `${Math.round(zoom * 100)}%`;
      }

      // Fit to viewport on open
      function fitToViewport() {
        const svg = content.querySelector('svg');
        if (!svg) return;
        const svgW = svg.getBoundingClientRect().width / zoom;
        const svgH = svg.getBoundingClientRect().height / zoom;
        const vpW = viewport.clientWidth - 80;
        const vpH = viewport.clientHeight - 80;
        zoom = Math.min(vpW / svgW, vpH / svgH, 1);
        zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoom));
        updateZoom();
      }

      fitToViewport();

      overlay.querySelector('.zoom-in-btn').addEventListener('click', e => {
        e.stopPropagation();
        zoom = Math.min(ZOOM_MAX, zoom + ZOOM_STEP);
        updateZoom();
      });

      overlay.querySelector('.zoom-out-btn').addEventListener('click', e => {
        e.stopPropagation();
        zoom = Math.max(ZOOM_MIN, zoom - ZOOM_STEP);
        updateZoom();
      });

      overlay.querySelector('.zoom-reset-btn').addEventListener('click', e => {
        e.stopPropagation();
        zoom = 1;
        updateZoom();
      });

      overlay.querySelector('.zoom-fit-btn').addEventListener('click', e => {
        e.stopPropagation();
        fitToViewport();
      });

      function closeOverlay() {
        overlay.remove();
        document.body.style.overflow = '';
      }

      overlay.querySelector('.close-btn').addEventListener('click', e => {
        e.stopPropagation();
        closeOverlay();
      });

      // Close on backdrop click
      overlay.addEventListener('click', e => {
        if (e.target === overlay) closeOverlay();
      });

      // Mouse wheel zoom
      viewport.addEventListener('wheel', e => {
        if (e.ctrlKey || e.metaKey) {
          e.preventDefault();
          const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
          zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoom + delta));
          updateZoom();
        }
      }, { passive: false });

      // Keyboard: Esc to close, +/- to zoom
      function onKeyDown(e) {
        if (e.key === 'Escape') { closeOverlay(); document.removeEventListener('keydown', onKeyDown); }
        else if (e.key === '+' || e.key === '=') { zoom = Math.min(ZOOM_MAX, zoom + ZOOM_STEP); updateZoom(); }
        else if (e.key === '-') { zoom = Math.max(ZOOM_MIN, zoom - ZOOM_STEP); updateZoom(); }
        else if (e.key === '0') { zoom = 1; updateZoom(); }
      }
      document.addEventListener('keydown', onKeyDown);
    }

    // ===== Image Post-Processing =====
    // Pandoc writes images as ![alt](src){width="85%"} — the trailing {...}
    // sits OUTSIDE the image syntax, so marked renders it as a literal text
    // node after the <img>. We absorb it into inline style and attach a
    // click-to-zoom handler (mirroring the Mermaid overlay experience).
    function postProcessImages(root) {
      // 1. Absorb trailing {width=..}/{height=..} text nodes that follow an img.
      const imgs = Array.from(root.querySelectorAll('img'));
      for (const img of imgs) {
        let node = img.nextSibling;
        // skip empty whitespace-only text nodes, then check the next real node
        while (node && node.nodeType === Node.TEXT_NODE && node.textContent.trim() === '') {
          node = node.nextSibling;
        }
        if (node && node.nodeType === Node.TEXT_NODE) {
          const text = node.textContent;
          const m = text.match(/\{([^}]*)\}/);
          if (m) {
            const attrs = m[1];
            const styleParts = [];
            const wm = attrs.match(/width\s*=\s*"?([^"}\s]+)"?/i);
            const hm = attrs.match(/height\s*=\s*"?([^"}\s]+)"?/i);
            if (wm) {
              const w = wm[1];
              styleParts.push(`width:${w.includes('%') || w.includes('px') ? w : w + 'px'}`);
            }
            if (hm) {
              const h = hm[1];
              styleParts.push(`height:${h.includes('%') || h.includes('px') ? h : h + 'px'}`);
            }
            if (styleParts.length) {
              img.style.cssText += `;${styleParts.join(';')};max-width:100%;`;
            }
            // remove the entire {...} occurrence from the text node; if the
            // node is now only whitespace, drop it so no stray space remains.
            const leftover = text.replace(/\{[^}]*\}/g, '').replace(/\s+$/, '');
            if (leftover === '') {
              node.remove();
            } else {
              node.textContent = leftover;
            }
          }
        }
      }

      // 2. Attach click-to-zoom (skip images already inside clickable links).
      for (const img of imgs) {
        if (img.closest('a')) continue;
        img.addEventListener('click', () => openImageOverlay(img));
      }
    }

    // ===== Image Zoom Overlay =====
    // Unlike the Mermaid overlay (which scales an SVG from a fixed 1:1), an
    // image's natural pixel size varies wildly, so we fit-to-screen on open
    // and use width-based scaling + drag-to-pan.
    function openImageOverlay(srcImg) {
      const overlay = document.createElement('div');
      overlay.className = 'img-overlay';

      const ZOOM_STEP = 0.2;
      const ZOOM_MIN = 0.1;
      const ZOOM_MAX = 8;
      let zoom = 1;
      let naturalW = srcImg.naturalWidth || 0;
      let naturalH = srcImg.naturalHeight || 0;

      overlay.innerHTML = `
        <div class="img-overlay-toolbar">
          <button class="zoom-in-btn" title="放大">＋</button>
          <button class="zoom-out-btn" title="缩小">－</button>
          <button class="zoom-reset-btn" title="1:1 实际尺寸">1:1</button>
          <button class="zoom-fit-btn" title="适应窗口">⊡</button>
          <button class="close-btn" title="关闭 (Esc)">✕</button>
        </div>
        <div class="img-overlay-viewport">
          <img src="${srcImg.src}" alt="${srcImg.alt || ''}">
        </div>
        <div class="img-overlay-zoom-label">100%</div>
      `;

      document.body.appendChild(overlay);
      document.body.style.overflow = 'hidden';

      const viewport = overlay.querySelector('.img-overlay-viewport');
      const img = overlay.querySelector('img');
      const zoomLabel = overlay.querySelector('.img-overlay-zoom-label');

      function applySize() {
        img.style.width = (naturalW * zoom) + 'px';
        img.style.height = 'auto';
        zoomLabel.textContent = `${Math.round(zoom * 100)}%`;
      }

      // Fit to viewport on open (cap at 1:1 so small images don't upscale).
      function fitToViewport() {
        if (!naturalW || !naturalH) { zoom = 1; applySize(); return; }
        const vpW = viewport.clientWidth - 40;
        const vpH = viewport.clientHeight - 40;
        zoom = Math.min(vpW / naturalW, vpH / naturalH, 1);
        zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoom));
        applySize();
        viewport.scrollTo(0, 0);
      }

      function updateZoom(delta) {
        const prev = zoom;
        zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoom + delta));
        // keep the viewport center fixed while zooming
        const cx = viewport.scrollLeft + viewport.clientWidth / 2;
        const cy = viewport.scrollTop + viewport.clientHeight / 2;
        const ratio = zoom / prev;
        applySize();
        viewport.scrollLeft = cx * ratio - viewport.clientWidth / 2;
        viewport.scrollTop = cy * ratio - viewport.clientHeight / 2;
      }

      // Wait for the image to load so naturalWidth/Height are known.
      if (img.complete && naturalW) {
        fitToViewport();
      } else {
        img.addEventListener('load', () => {
          naturalW = img.naturalWidth;
          naturalH = img.naturalHeight;
          fitToViewport();
        }, { once: true });
        // Fall back to 1:1 if load never fires.
        setTimeout(() => { if (!naturalW) { naturalW = img.width; naturalH = img.height; fitToViewport(); } }, 500);
      }

      overlay.querySelector('.zoom-in-btn').addEventListener('click', e => { e.stopPropagation(); updateZoom(ZOOM_STEP); });
      overlay.querySelector('.zoom-out-btn').addEventListener('click', e => { e.stopPropagation(); updateZoom(-ZOOM_STEP); });
      overlay.querySelector('.zoom-reset-btn').addEventListener('click', e => { e.stopPropagation(); zoom = 1; applySize(); });
      overlay.querySelector('.zoom-fit-btn').addEventListener('click', e => { e.stopPropagation(); fitToViewport(); });

      function closeOverlay() {
        overlay.remove();
        document.body.style.overflow = '';
      }
      overlay.querySelector('.close-btn').addEventListener('click', e => { e.stopPropagation(); closeOverlay(); });

      // Close on backdrop click (but not on the image itself)
      overlay.addEventListener('click', e => {
        if (e.target === overlay) closeOverlay();
      });

      // Mouse wheel zoom (Ctrl/Cmd) or plain wheel = zoom too
      viewport.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
        updateZoom(delta);
      }, { passive: false });

      // Drag-to-pan
      let dragging = false, startX = 0, startY = 0, scrollX = 0, scrollY = 0;
      viewport.addEventListener('mousedown', e => {
        dragging = true;
        startX = e.pageX;
        startY = e.pageY;
        scrollX = viewport.scrollLeft;
        scrollY = viewport.scrollTop;
        viewport.classList.add('dragging');
      });
      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        viewport.scrollLeft = scrollX - (e.pageX - startX);
        viewport.scrollTop = scrollY - (e.pageY - startY);
      });
      document.addEventListener('mouseup', () => {
        if (dragging) { dragging = false; viewport.classList.remove('dragging'); }
      });

      // Keyboard: Esc to close, +/-/0 to zoom
      function onKeyDown(e) {
        if (e.key === 'Escape') { closeOverlay(); document.removeEventListener('keydown', onKeyDown); }
        else if (e.key === '+' || e.key === '=') { updateZoom(ZOOM_STEP); }
        else if (e.key === '-') { updateZoom(-ZOOM_STEP); }
        else if (e.key === '0') { zoom = 1; applySize(); }
      }
      document.addEventListener('keydown', onKeyDown);
    }

    // ===== API Functions =====
    async function fetchTree() {
      const res = await fetch('/api/tree');
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data;
    }

    async function fetchFile(path) {
      const res = await fetch(`/api/file?path=${encodeURIComponent(path)}`);
      if (!res.ok) {
        const text = await res.text();
        let msg = text || res.statusText;
        try {
          const err = JSON.parse(text);
          if (err.error) msg = err.error;
        } catch (_) { /* not JSON, use raw text */ }
        throw new Error(msg);
      }
      return await res.json();
    }

    // ===== Directory Switching =====
    async function switchToDir(dirPath) {
      const input = document.getElementById('dir-input');
      const errorEl = document.getElementById('dir-error');

      if (!dirPath) return;

      errorEl.style.display = 'none';

      try {
        const res = await fetch(`/api/switch?dir=${encodeURIComponent(dirPath)}`);
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || res.statusText);
        }
        const info = await res.json();

        // Save to localStorage
        localStorage.setItem('md-browser-last-dir', info.path);

        // Reload tree
        await loadTree();

        // Update input placeholder
        input.value = '';
        input.placeholder = info.path;
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    }

    async function switchDirectory() {
      const dirPath = document.getElementById('dir-input').value.trim();
      if (dirPath) await switchToDir(dirPath);
    }

    async function pickFolder() {
      const btn = document.getElementById('dir-picker-btn');
      const errorEl = document.getElementById('dir-error');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '⏳';

      try {
        const res = await fetch('/api/pick-folder');
        const data = await res.json();
        if (data.path) {
          await switchToDir(data.path);
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '📂';
      }
    }

    // Enter key triggers switch
    document.getElementById('dir-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') switchDirectory();
    });

    // ===== Tree Rendering =====
    function renderTree(node, container, depth = 0) {
      if (node.type === 'directory') {
        const item = document.createElement('div');
        item.className = 'tree-item';

        const folder = document.createElement('div');
        folder.className = 'tree-folder';
        folder.style.paddingLeft = `${12 + depth * 16}px`;
        folder.innerHTML = `
          <span class="icon">▶</span>
          <span class="folder-icon">📁</span>
          <span>${node.name}</span>
        `;

        const children = document.createElement('div');
        children.className = 'tree-children';

        // Auto-expand first level
        if (depth === 0) {
          children.classList.add('expanded');
          folder.querySelector('.icon').classList.add('expanded');
          folder.querySelector('.folder-icon').textContent = '📂';
        }

        folder.addEventListener('click', () => {
          const isExpanded = children.classList.contains('expanded');
          children.classList.toggle('expanded');
          folder.querySelector('.icon').classList.toggle('expanded');
          folder.querySelector('.folder-icon').textContent = isExpanded ? '📁' : '📂';
        });

        item.appendChild(folder);

        // Render children (files first shown, then subfolders)
        if (node.children) {
          // Sort: files first (README at top), then directories
          const files = node.children.filter(c => c.type === 'file');
          const dirs = node.children.filter(c => c.type === 'directory');

          // Put README first among files
          const readme = files.find(f => f.filename === 'README.md');
          const otherFiles = files.filter(f => f.filename !== 'README.md');

          if (readme) renderTree(readme, children, depth + 1);
          otherFiles.forEach(child => renderTree(child, children, depth + 1));
          dirs.forEach(child => renderTree(child, children, depth + 1));
        }

        item.appendChild(children);
        container.appendChild(item);
      } else if (node.type === 'file') {
        const file = document.createElement('div');
        file.className = 'tree-file';
        file.style.paddingLeft = `${32 + depth * 16}px`;
        file.dataset.path = node.path;
        file.innerHTML = `
          <span class="file-icon">📄</span>
          <span>${node.name}</span>
        `;

        file.addEventListener('click', () => loadFile(node.path));
        container.appendChild(file);
      }
    }

    // ===== Sidebar Tabs & TOC =====
    let currentTab = 'files';
    let tocHeadings = []; // [{ tocItem, headingEl }] populated by buildTOC

    function switchTab(tab) {
      if (tab === currentTab) return;
      currentTab = tab;
      document.getElementById('tab-files').classList.toggle('active', tab === 'files');
      document.getElementById('tab-outline').classList.toggle('active', tab === 'outline');
      const tree = document.getElementById('tree-container');
      const toc = document.getElementById('toc-container');
      const show = tab === 'files' ? tree : toc;
      const hide = tab === 'files' ? toc : tree;
      // Fade out the current panel, swap display, then fade in the new one
      hide.style.opacity = '0';
      setTimeout(() => {
        hide.style.display = 'none';
        show.style.display = 'block';
        show.style.opacity = '0';
        requestAnimationFrame(() => { show.style.opacity = '1'; });
      }, 120);
    }

    function buildTOC(markdownSource) {
      const tocContainer = document.getElementById('toc-container');
      const outlineTab = document.getElementById('tab-outline');

      // Extract headings directly from markdown source (skip code blocks)
      const headings = [];
      const lines = (markdownSource || '').split('\n');
      let inCodeBlock = false;
      for (const line of lines) {
        if (line.trim().startsWith('```')) {
          inCodeBlock = !inCodeBlock;
          continue;
        }
        if (inCodeBlock) continue;
        const match = line.match(/^(#{1,4})\s+(.+)/);
        if (match) {
          headings.push({ level: match[1].length, text: match[2].replace(/[*_`\[\]]/g, '').trim() });
        }
      }

      if (headings.length === 0) {
        tocContainer.innerHTML = '<div id="toc-empty">No headings found</div>';
        outlineTab.disabled = false;
        tocHeadings = [];
        return;
      }

      // Match each source heading to its rendered DOM element (by level + occurrence)
      const content = document.getElementById('content');
      const domHeadings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');
      const levelCounters = {};
      const domByLevel = [];
      domHeadings.forEach(el => {
        const lvl = parseInt(el.tagName[1]);
        domByLevel.push({ el, level: lvl, occ: levelCounters[lvl] || 0 });
        levelCounters[lvl] = (levelCounters[lvl] || 0) + 1;
      });

      tocContainer.innerHTML = '';
      tocHeadings = [];
      headings.forEach((h, idx) => {
        // Count occurrence index among same-level source headings
        let sameLevelBefore = 0;
        for (let i = 0; i < idx; i++) {
          if (headings[i].level === h.level) sameLevelBefore++;
        }
        // Find matching DOM heading
        let headingEl = null;
        for (const d of domByLevel) {
          if (d.level === h.level && d.occ === sameLevelBefore) {
            headingEl = d.el;
            break;
          }
        }
        if (!headingEl) return;

        const item = document.createElement('div');
        item.className = `toc-item toc-h${h.level}`;
        item.textContent = h.text;
        item.addEventListener('click', () => {
          headingEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
          // Highlight will be updated by scroll handler; force immediate update
          updateActiveTOC(headingEl);
        });
        tocContainer.appendChild(item);
        tocHeadings.push({ tocItem: item, headingEl });
      });

      outlineTab.disabled = false;
    }

    // Update the active (highlighted) TOC item based on scroll position
    function updateActiveTOC(triggerEl) {
      if (tocHeadings.length === 0) return;
      const wrapper = document.getElementById('content-wrapper');
      const scrollTop = wrapper.scrollTop;
      const viewportH = wrapper.clientHeight;
      // Threshold: a heading is "active" once it crosses ~1/4 down the viewport
      const threshold = viewportH * 0.25;

      let activeEl = null;
      for (const { tocItem, headingEl } of tocHeadings) {
        const rect = headingEl.getBoundingClientRect();
        const wrapperRect = wrapper.getBoundingClientRect();
        const top = rect.top - wrapperRect.top;
        if (top <= threshold) {
          activeEl = tocItem;
        } else {
          break;
        }
      }

      // If none above threshold (top of doc), highlight first
      if (!activeEl && tocHeadings.length > 0) activeEl = tocHeadings[0].tocItem;

      if (activeEl) {
        const changed = !activeEl.classList.contains('active');
        if (changed) {
          tocHeadings.forEach(({ tocItem }) => tocItem.classList.remove('active'));
          activeEl.classList.add('active');
          // Keep active item visible in the TOC scroll area
          const tocContainer = document.getElementById('toc-container');
          const itemRect = activeEl.getBoundingClientRect();
          const containerRect = tocContainer.getBoundingClientRect();
          if (itemRect.top < containerRect.top) {
            tocContainer.scrollTop -= (containerRect.top - itemRect.top);
          } else if (itemRect.bottom > containerRect.bottom) {
            tocContainer.scrollTop += (itemRect.bottom - containerRect.bottom);
          }
        }
      }
    }

    // ===== Search Highlight in Content =====
    function highlightSearchTerm(term) {
      const content = document.getElementById('content');
      if (!term || !content) return 0;

      const lowerTerm = term.toLowerCase();
      const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null);
      const matches = [];

      while (walker.nextNode()) {
        const node = walker.currentNode;
        // Skip code blocks (they have their own highlighting)
        if (node.parentElement && node.parentElement.closest('pre')) continue;
        // Skip KaTeX formula internals — highlighting would break rendered math
        if (node.parentElement && node.parentElement.closest('.katex')) continue;
        const text = node.textContent;
        const lowerText = text.toLowerCase();
        let idx = lowerText.indexOf(lowerTerm);
        if (idx >= 0) {
          matches.push({ node, idx, text });
        }
      }

      let count = 0;
      for (const { node, text } of matches) {
        const parent = node.parentNode;
        if (!parent) continue;
        const frag = document.createDocumentFragment();
        let remaining = text;
        const lowerRemaining = remaining.toLowerCase();
        let pos = lowerRemaining.indexOf(lowerTerm);

        while (pos >= 0) {
          if (pos > 0) frag.appendChild(document.createTextNode(remaining.substring(0, pos)));
          const span = document.createElement('span');
          span.className = count === 0 ? 'search-match search-match-first' : 'search-match';
          span.textContent = remaining.substring(pos, pos + term.length);
          frag.appendChild(span);
          remaining = remaining.substring(pos + term.length);
          pos = remaining.toLowerCase().indexOf(lowerTerm);
          count++;
        }
        if (remaining) frag.appendChild(document.createTextNode(remaining));
        parent.replaceChild(frag, node);
      }

      return count;
    }

    // ===== Code Line Numbers =====
    function addCodeLineNumbers() {
      const content = document.getElementById('content');
      content.querySelectorAll('pre code').forEach(block => {
        if (block.classList.contains('language-mermaid')) return;
        const text = block.textContent;
        const lines = text.split('\n');
        // Remove trailing empty line from split
        if (lines.length > 1 && lines[lines.length - 1].trim() === '') lines.pop();
        if (lines.length < 2) return; // Skip single-line blocks

        const nums = document.createElement('span');
        nums.className = 'line-num';
        nums.innerHTML = lines.map((_, i) => i + 1).join('\n');
        block.parentNode.insertBefore(nums, block);
      });
    }

    // ===== File Loading =====
    async function loadFile(path, fragment, searchTerm) {
      // Update active state in sidebar
      document.querySelectorAll('.tree-file').forEach(el => el.classList.remove('active'));
      const activeEl = document.querySelector(`.tree-file[data-path="${path}"]`);
      if (activeEl) activeEl.classList.add('active');

      // Push to navigation history (skip if triggered by back/forward)
      if (!navSkipPush) {
        // Trim forward history when navigating to a new file
        navHistory = navHistory.slice(0, navIndex + 1);
        navHistory.push(path);
        navIndex = navHistory.length - 1;
      }
      navSkipPush = false;
      updateNavButtons();

      // Show loading
      const content = document.getElementById('content');
      const welcome = document.getElementById('welcome');
      content.style.display = 'none';
      welcome.style.display = 'none';

      const wrapper = document.getElementById('content-wrapper');
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'loading';
      loadingDiv.id = 'loading';
      wrapper.appendChild(loadingDiv);

      try {
        const data = await fetchFile(path);
        currentFile = path;

        // Update breadcrumb
        const parts = path.split('/');
        const breadcrumb = document.getElementById('breadcrumb');
        breadcrumb.innerHTML = parts.map((part, i) => {
          if (i === parts.length - 1) {
            return `<span class="current">${part}</span>`;
          }
          return `<span>${part}</span><span>/</span>`;
        }).join('');

        // Render markdown (extract math first so marked doesn't mangle formulas)
        const mathSrc = extractMath(data.content);
        content.innerHTML = marked.parse(mathSrc);
        content.style.display = 'block';

        // Absorb Pandoc-style {width=.. height=..} attribute syntax that
        // marked leaves as literal text after images, applying it as inline
        // style and wiring up click-to-zoom.
        postProcessImages(content);

        // Render math formulas (KaTeX) — must run after innerHTML is set
        renderMath();

        // Build TOC from markdown source (before hljs to avoid dependency)
        buildTOC(data.content);

        // Auto-switch to Outline tab when opening a file
        if (tocHeadings.length > 0) {
          switchTab('outline');
        }

        // Syntax highlight code blocks (skip mermaid blocks)
        content.querySelectorAll('pre code').forEach(block => {
          if (block.classList.contains('language-mermaid')) return;
          try { hljs.highlightElement(block); } catch (e) {}
        });

        // Add line numbers to code blocks (skip mermaid blocks)
        addCodeLineNumbers();

        // Render Mermaid diagrams
        await renderMermaidDiagrams();

        // Highlight search matches and scroll to first match
        if (searchTerm) {
          const matchCount = highlightSearchTerm(searchTerm);
          const firstMatch = content.querySelector('.search-match-first');
          if (firstMatch) {
            setTimeout(() => firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
          } else if (matchCount === 0) {
            wrapper.scrollTop = 0;
          }
        } else if (fragment) {
          // Scroll to anchor or top
          const el = findAnchorElement(fragment);
          if (el) {
            setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
          } else {
            wrapper.scrollTop = 0;
          }
        } else {
          wrapper.scrollTop = 0;
        }

        // Sync TOC highlight to current scroll position (after any anchor jump settles)
        requestAnimationFrame(() => requestAnimationFrame(() => updateActiveTOC()));
      } catch (err) {
        content.innerHTML = `<h1>Error</h1><p>${err.message}</p>`;
        content.style.display = 'block';
      } finally {
        const loading = document.getElementById('loading');
        if (loading) loading.remove();
      }
    }

    // ===== Link Navigation =====
    function navigateToLink(href, fragment) {
      if (!currentFile) return;

      // Resolve relative path from current file
      const currentDir = currentFile.includes('/')
        ? currentFile.substring(0, currentFile.lastIndexOf('/'))
        : '';
      let targetPath;

      if (href.startsWith('../')) {
        const parts = currentDir.split('/').filter(Boolean);
        const upCount = (href.match(/\.\.\//g) || []).length;
        for (let i = 0; i < upCount && parts.length > 0; i++) {
          parts.pop();
        }
        const remaining = href.replace(/(\.\.\/)+/, '');
        targetPath = [...parts, remaining].join('/');
      } else if (href.startsWith('./')) {
        targetPath = currentDir ? `${currentDir}/${href.substring(2)}` : href.substring(2);
      } else {
        targetPath = currentDir ? `${currentDir}/${href}` : href;
      }

      targetPath = targetPath.replace(/\/+/g, '/');

      loadFile(targetPath, fragment);
    }

    // Resolve an image's relative path against the currently open file's
    // directory, producing a base-directory-relative path for /api/asset.
    // Mirrors navigateToLink's resolution but without fragment handling.
    function resolveAssetPath(href) {
      if (!currentFile) return href.replace(/^\.?\//, '');
      const currentDir = currentFile.includes('/')
        ? currentFile.substring(0, currentFile.lastIndexOf('/'))
        : '';

      let targetPath;
      if (href.startsWith('../')) {
        const parts = currentDir.split('/').filter(Boolean);
        const upCount = (href.match(/\.\.\//g) || []).length;
        for (let i = 0; i < upCount && parts.length > 0; i++) parts.pop();
        const remaining = href.replace(/(\.\.\/)+/, '');
        targetPath = [...parts, remaining].join('/');
      } else if (href.startsWith('./')) {
        targetPath = currentDir ? `${currentDir}/${href.substring(2)}` : href.substring(2);
      } else if (href.startsWith('/')) {
        targetPath = href.substring(1);
      } else {
        targetPath = currentDir ? `${currentDir}/${href}` : href;
      }
      return targetPath.replace(/\/+/g, '/');
    }

    // Scroll to an anchor within the current document
    function scrollToAnchor(fragment) {
      const el = findAnchorElement(fragment);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    // Find element matching a fragment (heading id or text match)
    function findAnchorElement(fragment) {
      const content = document.getElementById('content');
      // Try by id first (marked generates ids for headings)
      let el = document.getElementById(fragment);
      if (el) return el;
      // Try by decoded id
      el = document.getElementById(decodeURIComponent(fragment));
      if (el) return el;
      // Try matching heading text
      const decoded = decodeURIComponent(fragment).replace(/-/g, ' ').toLowerCase();
      const headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');
      for (const h of headings) {
        if (h.textContent.toLowerCase().trim() === decoded) return h;
        if (h.id && h.id.toLowerCase() === fragment.toLowerCase()) return h;
      }
      return null;
    }

    // ===== Navigation History =====
    function updateNavButtons() {
      document.getElementById('btn-back').disabled = navIndex <= 0;
      document.getElementById('btn-forward').disabled = navIndex >= navHistory.length - 1;
    }

    function navigateBack() {
      if (navIndex <= 0) return;
      navIndex--;
      navSkipPush = true;
      loadFile(navHistory[navIndex]);
    }

    function navigateForward() {
      if (navIndex >= navHistory.length - 1) return;
      navIndex++;
      navSkipPush = true;
      loadFile(navHistory[navIndex]);
    }

    // Ctrl+Left / Ctrl+Right shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'ArrowLeft') {
        e.preventDefault();
        navigateBack();
      }
      if (e.ctrlKey && e.key === 'ArrowRight') {
        e.preventDefault();
        navigateForward();
      }
    });

    // ===== TOC scroll-spy: highlight current heading in Outline =====
    let tocScrollTimer = null;
    document.getElementById('content-wrapper').addEventListener('scroll', () => {
      if (tocHeadings.length === 0) return;
      if (tocScrollTimer) return; // throttle: one update per frame
      tocScrollTimer = requestAnimationFrame(() => {
        tocScrollTimer = null;
        updateActiveTOC();
      });
    });

    // ===== Search =====
    let searchTimer = null;
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');

    // (search input/keydown listeners are registered below in the Search History section)

    function triggerSearch() {
      clearTimeout(searchTimer);
      const q = searchInput.value.trim();
      if (q.length < 2) {
        searchResults.classList.remove('visible');
        searchResults.innerHTML = '';
        return;
      }
      addHistory(q);   // record explicit searches (Enter / Search button / history reuse)
      doSearch(q);
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!document.getElementById('search-wrapper').contains(e.target)) {
        searchResults.classList.remove('visible');
      }
    });

    // Ctrl+K / Cmd+K to focus search
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
      }
    });

    async function doSearch(q) {
      searchResults.innerHTML = '<div id="search-status">Searching...</div>';
      searchResults.classList.add('visible');

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();

        if (!data.results || data.results.length === 0) {
          searchResults.innerHTML = `<div id="search-status">No results for "${q}"</div>`;
          return;
        }

        searchResults.innerHTML = data.results.map((r, i) => {
          const highlighted = highlightMatch(escapeHtml(r.text), q);
          const lineLabel = r.line > 0 ? `:${r.line}` : '';
          return `<div class="search-result-item" onclick="openSearchResult('${r.path}', ${r.line})">
            <div class="search-result-path">
              <span class="file-name">${escapeHtml(r.name)}</span>${escapeHtml(lineLabel)}
              <span style="float:right;color:#ccc;">${escapeHtml(r.path)}</span>
            </div>
            <div class="search-result-text">${highlighted}</div>
          </div>`;
        }).join('');

        if (data.total >= 50) {
          searchResults.innerHTML += '<div id="search-status">...showing first 50 results</div>';
        }
      } catch (err) {
        searchResults.innerHTML = `<div id="search-status">Error: ${err.message}</div>`;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function highlightMatch(html, query) {
      const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return html.replace(re, '<mark>$1</mark>');
    }

    function openSearchResult(path, line) {
      const query = searchInput.value.trim();
      searchResults.classList.remove('visible');
      searchInput.value = '';
      loadFile(path, null, query);
    }

    // ===== Search History =====
    const HISTORY_KEY = 'md-browser-search-history';
    const HISTORY_MAX = 8;
    let historyActiveIndex = -1; // keyboard-selected index in history list

    function getHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (_) { return []; }
    }

    function saveHistory(list) {
      try { localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); } catch (_) {}
    }

    function addHistory(query) {
      const q = query.trim();
      if (!q) return;
      let list = getHistory().filter(item => item !== q); // dedupe + remove old position
      list.unshift(q);
      if (list.length > HISTORY_MAX) list = list.slice(0, HISTORY_MAX);
      saveHistory(list);
    }

    function removeHistory(query) {
      saveHistory(getHistory().filter(item => item !== query));
      showHistory();
    }

    function clearHistory() {
      saveHistory([]);
      showHistory();
    }

    // Render the history dropdown (shown when search box is focused & empty)
    function showHistory() {
      const list = getHistory();
      historyActiveIndex = -1;
      let html = '';
      if (list.length === 0) {
        html = '<div id="search-history-empty">No search history yet</div>';
      } else {
        html = '<div id="search-history-header"><span>Recent</span>' +
               '<button id="search-history-clear" onclick="clearHistory()">Clear all</button></div>';
        html += list.map((q) =>
          `<div class="search-history-item" onclick="useHistory('${escapeAttr(q)}')" data-q="${escapeAttr(q)}">
             <span class="hist-icon">&#128337;</span>
             <span class="hist-text">${escapeHtml(q)}</span>
             <button class="hist-del" onclick="event.stopPropagation(); removeHistory('${escapeAttr(q)}')">&times;</button>
           </div>`
        ).join('');
      }
      searchResults.innerHTML = html;
      searchResults.classList.add('visible');
    }

    function hideResults() {
      searchResults.classList.remove('visible');
      searchResults.innerHTML = '';
      historyActiveIndex = -1;
    }

    function useHistory(query) {
      searchInput.value = query;
      hideResults();
      triggerSearch();
    }

    function escapeAttr(s) {
      // safe for use inside single-quoted HTML attribute and onclick string
      return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // Show history when focusing the (empty) search box
    searchInput.addEventListener('focus', () => {
      if (searchInput.value.trim().length === 0) {
        showHistory();
      }
    });

    // Update the visible list as the user types
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const q = searchInput.value.trim();
      if (q.length === 0) {
        showHistory();
        return;
      }
      if (q.length < 2) {
        hideResults();
        return;
      }
      searchTimer = setTimeout(() => doSearch(q), 250);
    });

    // Arrow-key navigation within the history list + Enter handling
    searchInput.addEventListener('keydown', (e) => {
      // Only navigate history when the dropdown shows history items
      const histItems = searchResults.querySelectorAll('.search-history-item');
      if (histItems.length > 0) {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          historyActiveIndex = Math.min(historyActiveIndex + 1, histItems.length - 1);
          highlightHistoryItem(histItems);
          return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          historyActiveIndex = Math.max(historyActiveIndex - 1, -1);
          highlightHistoryItem(histItems);
          return;
        }
      }
      if (e.key === 'Enter') {
        e.preventDefault();
        clearTimeout(searchTimer);
        if (historyActiveIndex >= 0 && historyActiveIndex < histItems.length) {
          useHistory(histItems[historyActiveIndex].dataset.q);
        } else {
          triggerSearch();
        }
      }
      if (e.key === 'Escape') {
        hideResults();
        searchInput.blur();
      }
    });

    function highlightHistoryItem(items) {
      items.forEach((el, i) => el.classList.toggle('active', i === historyActiveIndex));
      if (historyActiveIndex >= 0 && items[historyActiveIndex]) {
        items[historyActiveIndex].scrollIntoView({ block: 'nearest' });
      }
    }

    // ===== Tree Loading =====
    async function loadTree() {
      try {
        treeData = await fetchTree();
        document.getElementById('dir-name').textContent = treeData.name;
        document.title = `MD Browser - ${treeData.name}`;

        const container = document.getElementById('tree-container');
        container.innerHTML = '';
        renderTree(treeData, container);

        // Reset content area
        currentFile = null;
        document.getElementById('content').style.display = 'none';
        document.getElementById('welcome').style.display = 'flex';
        document.getElementById('breadcrumb').innerHTML = '<span>Select a file from the sidebar</span>';
      } catch (err) {
        document.getElementById('tree-container').innerHTML = '';
        throw err;
      }
    }

    // ===== Initialization =====
    async function init() {
      // Restore sidebar width and hidden state first (independent of directory)
      restoreSidebar();

      // Try to restore last opened directory
      const lastDir = localStorage.getItem('md-browser-last-dir');

      try {
        await loadTree();
      } catch (err) {
        document.getElementById('tree-container').innerHTML = '';
        document.getElementById('dir-name').textContent = '';

        // Auto-open last directory if available
        if (lastDir) {
          await switchToDir(lastDir);
        }
      }
    }

    init();
  </script>
</body>
</html>
