<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div id="output"></div>
<div id="debug"></div>
<script>
const md = `# Title One
## Section Two
### Sub Three
Some text here.
## Another Section
More text.`;

const html = marked.parse(md);
document.getElementById('output').innerHTML = html;

const headings = document.getElementById('output').querySelectorAll('h1, h2, h3, h4');
const debug = [];
debug.push('HTML output: ' + html.substring(0, 200));
debug.push('Headings found: ' + headings.length);
headings.forEach(h => debug.push('  ' + h.tagName + ': ' + h.textContent));

document.getElementById('debug').innerHTML = '<pre>' + debug.join('\n') + '</pre>';
</script>
</body>
</html>
